<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>CodeCraft</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --sub: #475569;
      --mute: #94a3b8;
      --border: #e5e7eb;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    html, body { margin: 0; padding: 0; background: var(--bg); }

    body {
      font-family: 'Pretendard Variable', Pretendard, 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--text);
      line-height: 1.7;
      letter-spacing: -0.01em;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrap {
      flex: 1;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    main { padding: 12vh 0 8vh; }

    .brand {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.3;
      margin: 0 0 1.4rem;
    }
    h1 .grad {
      background: linear-gradient(120deg, var(--accent), #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lede {
      font-size: 1.05rem;
      color: var(--sub);
      margin: 0 0 2.2rem;
      max-width: 540px;
    }

    .note {
      font-size: 0.95rem;
      color: var(--sub);
      margin: 0 0 2.6rem;
      max-width: 540px;
    }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 11px 18px;
      border-radius: 10px;
      transition: all 0.2s ease;
      align-self: flex-start;
    }
    .contact:hover {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    footer {
      padding: 2rem 0 2.5rem;
      color: var(--mute);
      font-size: 0.82rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      main { padding: 10vh 0 6vh; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <main>
      <div class="brand">&lt;CodeCraft/&gt;</div>

      <h1>
        여러 가지 실험을 통해<br>
        <span class="grad">IT 서비스를 만드는 개발자</span>
      </h1>

      <p class="lede">
        작은 아이디어를 직접 코드로 옮겨보고, 만들고 부수고 다시 만들면서
        쓸모 있는 서비스로 다듬어 갑니다.
      </p>

      <p class="note">
        혼자 기획부터 개발, 운영까지 굴려보는 사이드 실험들의 기록입니다.
        새로운 시도와 협업에 대한 이야기는 언제나 환영합니다.
      </p>

      <a href="mailto:director@code-craft-service.com" class="contact">
        ✉ director@code-craft-service.com
      </a>
    </main>
  </div>

  <footer>
    © 2026 CodeCraft
  </footer>
</body>
</html>
